[phases.setup]
nixPkgs = ["php82", "php82Extensions.gd", "php82Extensions.mbstring", "php82Extensions.pdo_mysql", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.zip", "php82Extensions.bcmath", "nodejs_20"]

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer && /usr/local/bin/composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-gd && npm install && npm run build"
]

[phases.build]
cmds = ["php artisan config:cache && php artisan route:cache && php artisan view:cache"]

[start]
cmd = "php artisan migrate --force --seed && php artisan serve --host=0.0.0.0 --port=$PORT"