cat > render.yaml << 'EOF'
services:
  - type: web
    name: andrufar-laravel
    env: php
    plan: free
    buildCommand: "composer install --no-dev --optimize-autoloader && npm install && npm run build && php artisan config:cache && php artisan route:cache"
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
EOF