services:
  - type: web
    name: andrufar-laravel
    env: php
    plan: free
    buildCommand: >
      composer install --no-dev --optimize-autoloader &&
      npm install &&
      npm run build &&
      php artisan key:generate --force &&
      php artisan config:cache &&
      php artisan route:cache &&
      php artisan view:cache &&
      php artisan migrate --force
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://andrufar-laravel.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: andrufar-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: andrufar-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: andrufar-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: andrufar-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: andrufar-db
          property: password

databases:
  - name: andrufar-db
    databaseName: andrufar
    user: andrufar_user
    plan: free